version: '3.8'

services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: db_root_password
      MARIADB_USER: db_user
      MARIADB_PASSWORD: db_password
      MARIADB_DATABASE: app_db
    volumes:
      - ./db:/var/lib/mysql

  app:
      build: .
      ports:
        - "5000:5000"
      command: flask run --host=0.0.0.0  # ここを追加
      environment:
        FLASK_APP: app.py
        FLASK_DEBUG: 1
      volumes:
        - ./app:/app
      depends_on:
        - db