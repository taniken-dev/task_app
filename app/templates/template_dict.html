<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
</head>

<body>
    <h1>{{title}}</h1>
    <ul>
        {% for student, class in students.items(): %}
            {% if class in classes: %}
            <li><strong>{{ student }} - {{ class }}クラス</strong></li>
            {% else %}
            <li>{{ student }} - {{ class }}クラス</li>
            {% endif %}
        {% else %}
            <li>表示するデータがありません</li>
        {% endfor %}
    </ul>
</body>
</html>
