<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <title>{{title}}</title>
    <style>
        /* ソート用の矢印スタイル（クリック可能） */
        .sort-arrow {
            cursor: pointer;
            user-select: none; /* テキスト選択を無効化 */
            margin-left: 5px; /* 矢印とテキストの間の余白 */
        }
        /* テーブルヘッダーのスタイル */
        th {
            position: relative; /* 絶対位置の要素を基準にするため */
            padding-right: 25px; /* 矢印用のスペースを確保 */
            background: #f3f3f3
        }
        table{
            width: 100%;
        }
        th,td{
            padding: 10px;  
        }
        /* 矢印の絶対位置の設定 */
        th .sort-arrow {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: block;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid black;
            opacity: 0;
        }
        /* 昇順ソート時の矢印の表示（CSSでは内容を変更できないため、この部分はJSで制御する） */
        th.sorted-asc .sort-arrow {
            transform: rotate(180deg) translateY(4px);
            opacity: 1;
        }
        /* 降順ソート時の矢印の表示 */
        th.sorted-desc .sort-arrow {
            opacity: 1;
        }
    </style>

</head>
<body style="background-color:#bae2e2;">
    {% if current_user.is_authenticated: %}
    <header>
        <nav class="navbar bg-body-secondary">
            <div class="container-fluid">
                <h2 style="text-align:center"></h2></span><a href="/" class="nav-link"></a></span><strong>タスク一覧</strong></a>
                <style>
                    header{
                        font-size: 30px;
                        color:blue;
                        font-family: "Century";
                    }
                </style>
                <div class="nav-item">
                {{ current_user.id }}さん
                <a href="/logout"><button type="button" class="btn btn-primary btm-sm">ログアウト</button></a>
                <a href="/delete_account/{{ current_user.id }}"><button type="button" class="btn btn-warning">アカウント削除</button></a>
            </div>
        </nav>
    </header>
    {% endif %}
    <aside>
        <div class="container-fluid">
            {% for message in get_flashed_messages(): %}
            <div class="alert alert-warning alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="閉じる"></button>
            </div>
            {% endfor %}
        </div>
    </aside>
    <div class="container-fluid">
    <main>
        <div class="container-fluid">
            {% block content %}
            {% endblock content %}
        </div>
    </main>
</body>
</html>
