{% extends "base.html" %}
{% block content %}
<form action="/delete_account/{{ current_user.id }}" method="post">
    <div class="row">
        <div class="col-auto">
            以下のアカウントを削除しますか？
        </div>
        <div class="col-auto">
            <input type="submit" value="削除" class="btn btn-warning">
            <a href="/"><button type="button" class="btn btn-outline-primary">戻る</button></a>
        </div>
    </div>
</form>
<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>アカウント名</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>{{ current_user.id }}</td>
        </tr>
    </tbody>
</table>
{% endblock content %}
